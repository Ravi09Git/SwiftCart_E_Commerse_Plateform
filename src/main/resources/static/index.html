<!DOCTYPE html>
<html lang="hi">
<head>
    <title>Apni Dukaan - Online Shopping</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px; }
        .header { text-align: center; color: #2c3e50; }
        .product-container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 200px; text-align: center; }
        .price { color: #e74c3c; font-weight: bold; }
        button { background: #27ae60; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 5px; }


        /* Product Grid Styling */
.product-container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 25px;
    padding: 40px;
}

.card {
    background: #fff;
    border-radius: 15px;
    padding: 20px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.05);
    transition: 0.3s;
    border: 1px solid #eee;
}

.card:hover {
    transform: translateY(-10px);
    box-shadow: 0 15px 30px rgba(0,0,0,0.1);
}

.price {
    font-size: 1.2rem;
    color: #27ae60;
    font-weight: bold;
    margin: 10px 0;
}

button {
    width: 100%;
    background: #3498db;
    color: white;
    border: none;
    padding: 12px;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
}

button:hover { background: #2980b9; }
    </style>
</head>
<body>

    <div style="text-align: right; padding: 20px; background: white; position: sticky; top: 0; z-index: 100;">
    <span style="font-size: 20px;">🛒 Cart: <b id="cart-count">0</b></span>
</div>

    <div class="header">
        <h1>E-Commerce Online Store</h1>
        <p>Backend: Spring Boot | Frontend: JS</p>
    </div>

    <div class="product-container" id="products">
        </div>

    <script>

        //ye line product ko kart me add karne ke liye hai
                let count = 0;
                function addToCart() {
                count++;
                document.getElementById('cart-count').innerText = count;
                alert("Product added to cart!");
                }

        async function fetchProducts() {
            try {
                const response = await fetch('http://localhost:8080/api/products');
                const products = await response.json();
                const container = document.getElementById('products');

                


                if(products.length === 0) {
                    container.innerHTML = "<h3>Abhi koi product nahi hai. Backend mein data add karein!</h3>";
                }

                products.forEach(p => {
                console.log(p); // Ye line check karne ke liye hai ki console mein kya aa raha hai
                container.innerHTML += `
       
                <div class="card">
                 <h3>${p.name ? p.name : 'No Name'}</h3>
                 <p>${p.description ? p.description : ''}</p>
                 <p class="price">₹${p.price ? p.price : '0'}</p>
                 <button onclick="addToCart()">Buy Now</button>
                </div>
    `;
});
        
}
                catch (error) {
                console.error("Error fetching data:", error);
                document.getElementById('products').innerHTML = "Backend server chalu nahi hai!";
            }
        }
        fetchProducts();
    </script>
</body>
</html>
